# stunt adapter manifest — Xero Accounting API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Xero Accounting API (OAuth2)
# for LOCAL TESTING ONLY. It does not call the real Xero API. All data is
# synthetic. See DISCLAIMER.
id: xero-style
name: "Xero Accounting API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Xero Accounting API"
  version: "2.0"

# Auth: OAuth2 Bearer token (scoped to tenants).
identity:
  token_scheme: bearer

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- Connections (tenant list — first call every app makes) ---
  - route: /connections
    method: GET
    handler: scripts/connections.star#on_list_connections

  # --- Contacts ---
  - route: /api.xro/2.0/Contacts
    method: GET
    handler: scripts/contacts.star#on_list_contacts
  - route: /api.xro/2.0/Contacts
    method: PUT
    handler: scripts/contacts.star#on_put_contacts

  # --- Invoices ---
  - route: /api.xro/2.0/Invoices
    method: GET
    handler: scripts/invoices.star#on_list_invoices
  - route: /api.xro/2.0/Invoices
    method: PUT
    handler: scripts/invoices.star#on_put_invoices
  - route: /api.xro/2.0/Invoices/{id}
    method: GET
    handler: scripts/invoices.star#on_get_invoice
  - route: /api.xro/2.0/Invoices/{id}/Payments
    method: POST
    handler: scripts/invoices.star#on_post_payment

  # --- Accounts ---
  - route: /api.xro/2.0/Accounts
    method: GET
    handler: scripts/accounts.star#on_list_accounts

  # --- Bank Transactions ---
  - route: /api.xro/2.0/BankTransactions
    method: GET
    handler: scripts/bank.star#on_list_bank_transactions

  # --- Items ---
  - route: /api.xro/2.0/Items
    method: GET
    handler: scripts/items.star#on_list_items

  # --- Tracking Categories ---
  - route: /api.xro/2.0/TrackingCategories
    method: GET
    handler: scripts/tracking.star#on_list_tracking

  # --- Webhooks (inbound — HMAC signature verification) ---
  - route: /webhooks
    method: POST
    handler: scripts/webhooks.star#on_webhook

# Backing stores — collections for stateful data.
resources:
  - name: contacts
    kind: collection
  - name: invoices
    kind: collection
  - name: accounts
    kind: collection

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          ErrorNumber: 404
          Type: "NotFound"
          Message: "The requested resource was not found"
