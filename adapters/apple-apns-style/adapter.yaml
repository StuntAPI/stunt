# stunt adapter manifest — Apple Push Notification service (APNs) simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Apple Push Notification service
# (APNs) HTTP/2 API for LOCAL TESTING ONLY. It does not call the real Apple
# API. All data is synthetic. See DISCLAIMER.
id: apple-apns-style
name: "Apple Push Notification service (APNs) simulator (unofficial)"
version: "0.1.0"

api:
  name: "Apple Push Notification service (APNs)"
  version: "v2"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- Push notification send ---
  - route: /3/device/{deviceToken}
    method: POST
    handler: scripts/send.star#on_send

  # --- Internal: retrieve sent notifications (for testing) ---
  - route: /3/device/{deviceToken}/notifications
    method: GET
    handler: scripts/send.star#on_get_notifications

# Backing stores — collections for stateful data.
resources:
  - name: devices
    kind: collection
  - name: notifications
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer_jwt

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          reason: "BadPath"
