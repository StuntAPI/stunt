# stunt adapter manifest — App Store Connect API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the App Store Connect API (v3)
# for LOCAL TESTING ONLY. It does not call the real Apple API. All data is
# synthetic. See DISCLAIMER.
id: apple-appstoreconnect-style
name: "App Store Connect API simulator (unofficial)"
version: "0.1.0"

api:
  name: "App Store Connect API"
  version: "v3"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Literal routes first ---
  - route: /v1/apps
    method: GET
    handler: scripts/apps.star#on_list_apps
  - route: /v1/apps
    method: POST
    handler: scripts/apps.star#on_create_app
  - route: /v1/users
    method: GET
    handler: scripts/misc.star#on_list_users
  - route: /v1/salesReports
    method: GET
    handler: scripts/misc.star#on_sales_reports

  # --- Parameterized routes ---
  - route: /v1/apps/{id}
    method: GET
    handler: scripts/apps.star#on_get_app
  - route: /v1/apps/{id}/appStoreVersions
    method: GET
    handler: scripts/apps.star#on_list_app_versions
  - route: /v1/apps/{id}/builds
    method: GET
    handler: scripts/apps.star#on_list_builds
  - route: /v1/apps/{id}/appPrices
    method: GET
    handler: scripts/apps.star#on_list_app_prices

# Backing stores — collections for stateful data.
resources:
  - name: apps
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer_jwt

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors:
            - status: "404"
              code: "NOT_FOUND"
              title: "The specified resource was not found."
