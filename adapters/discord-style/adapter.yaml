# stunt adapter manifest — Discord-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of Discord's REST + OAuth2 API (v10)
# for LOCAL TESTING ONLY. It does not call the real Discord API. All data is
# synthetic. See DISCLAIMER.
id: discord-style
name: "Discord-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Discord API"
  version: "v10"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- OAuth2 ---
  - route: /oauth2/authorize
    method: GET
    handler: scripts/oauth.star#on_authorize
  - route: /oauth2/token
    method: POST
    handler: scripts/oauth.star#on_token
  - route: /oauth2/@me
    method: GET
    handler: scripts/oauth.star#on_oauth_me

  # --- Bot REST: user resolution ---
  - route: /users/@me
    method: GET
    handler: scripts/bot.star#on_bot_user

  # --- Bot REST: guild + channels ---
  - route: /guilds/{guild_id}
    method: GET
    handler: scripts/bot.star#on_guild
  - route: /guilds/{guild_id}/channels
    method: GET
    handler: scripts/bot.star#on_guild_channels

  # --- Bot REST: messages (stateful) ---
  - route: /channels/{channel_id}/messages
    method: POST
    handler: scripts/messages.star#on_send_message
  - route: /channels/{channel_id}/messages
    method: GET
    handler: scripts/messages.star#on_list_messages

  # --- Bot REST: reactions ---
  - route: /channels/{channel_id}/messages/{message_id}/reactions/{emoji}/@me
    method: POST
    handler: scripts/messages.star#on_react

# Backing stores — collections for stateful data.
resources:
  - name: oauth_codes
    kind: collection
  - name: access_tokens
    kind: collection
  - name: refresh_tokens
    kind: collection
  - name: guilds
    kind: collection
  - name: channels
    kind: collection
  - name: messages
    kind: collection

# Auth scheme metadata (mock: bot endpoints accept any bearer; OAuth2
# endpoints validate against the access_tokens collection).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          code: 0
          message: "404: Not Found"
