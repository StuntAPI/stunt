# stunt adapter manifest — Jumio Netverify API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Jumio API (v1) for LOCAL
# TESTING ONLY. It does not call the real Jumio API. All data is synthetic.
# See DISCLAIMER.
id: jumio-style
name: "Jumio Netverify API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Jumio API"
  version: "v1"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Scans ---
  - route: /netverify/v2/scans
    method: POST
    handler: scripts/scans.star#on_create_scan

  # --- Parameterized routes ---
  - route: /netverify/v2/scans/{scan_reference}
    method: GET
    handler: scripts/scans.star#on_get_scan
  - route: /netverify/v2/scans/{scan_reference}/data
    method: GET
    handler: scripts/scans.star#on_get_scan_data

  # --- Webhook receiver ---
  - route: /netverify/v2/webhooks
    method: POST
    handler: scripts/webhooks.star#on_webhook

# Backing stores — collections for stateful data.
resources:
  - name: scans
    kind: collection
  - name: webhook_events
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          httpStatus: 404
          message: "Resource not found"
