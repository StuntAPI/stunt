# stunt adapter manifest — Printify-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of a Printify-style print-on-demand API
# for LOCAL TESTING ONLY. It does not call the real Printify API. All data is
# synthetic. See DISCLAIMER.
id: printify-style
name: "Printify-style API simulator (unofficial)"
version: "0.1.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Catalog (blueprints + variants for variant-ID lookup) ---
  - route: /v1/catalog/blueprints.json
    method: GET
    handler: scripts/catalog.star#on_list_blueprints
  - route: /v1/catalog/blueprints/{blueprint_id}/variants.json
    method: GET
    handler: scripts/catalog.star#on_list_variants

  # --- Products ---
  - route: /v1/shops/{shop_id}/products.json
    method: GET
    handler: scripts/products.star#on_list_products
  - route: /v1/shops/{shop_id}/products.json
    method: POST
    handler: scripts/products.star#on_create_product
  - route: /v1/shops/{shop_id}/products/{product_id}
    method: GET
    handler: scripts/products.star#on_get_product
  - route: /v1/shops/{shop_id}/products/{product_id}
    method: PUT
    handler: scripts/products.star#on_update_product
  - route: /v1/shops/{shop_id}/products/{product_id}
    method: DELETE
    handler: scripts/products.star#on_delete_product

  # --- Orders ---
  # Shop-scoped create is the real Printify order-submission route; declared
  # alongside the legacy /v1/orders.json form. Both share one handler.
  - route: /v1/shops/{shop_id}/orders.json
    method: POST
    handler: scripts/orders.star#on_create_order
  - route: /v1/orders.json
    method: GET
    handler: scripts/orders.star#on_list_orders
  - route: /v1/orders.json
    method: POST
    handler: scripts/orders.star#on_create_order
  - route: /v1/orders/{order_id}/send.json
    method: POST
    handler: scripts/orders.star#on_send_order

# Backing stores — collections for stateful data.
resources:
  - name: products
    kind: collection
  - name: orders
    kind: collection

# Auth scheme metadata (mock: accept any non-empty bearer key).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          status: 404
          message: resource not found
