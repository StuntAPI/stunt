# stunt adapter manifest — YouTube-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the YouTube Data API v3 for LOCAL
# TESTING ONLY. It does not call the real YouTube API. All data is synthetic.
# See DISCLAIMER.
id: youtube-style
name: "YouTube-style API simulator (unofficial)"
version: "0.1.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- OAuth2 ---
  - route: /o/oauth2/auth
    method: GET
    handler: scripts/oauth.star#on_authorize
  - route: /o/oauth2/token
    method: POST
    handler: scripts/oauth.star#on_token

  # --- Videos (upload + list) ---
  - route: /upload/youtube/v3/videos
    method: POST
    handler: scripts/videos.star#on_upload_video
  - route: /youtube/v3/videos
    method: GET
    handler: scripts/videos.star#on_list_videos
  - route: /youtube/v3/videos
    method: DELETE
    handler: scripts/videos.star#on_delete_video

  # --- Channels ---
  - route: /youtube/v3/channels
    method: GET
    handler: scripts/channels.star#on_channels

  # --- Playlists (create + list) ---
  - route: /youtube/v3/playlists
    method: POST
    handler: scripts/playlists.star#on_create_playlist
  - route: /youtube/v3/playlists
    method: GET
    handler: scripts/playlists.star#on_list_playlists

  # --- Playlist items (add video to playlist) ---
  - route: /youtube/v3/playlistItems
    method: POST
    handler: scripts/playlists.star#on_add_playlist_item

# Backing stores — collections for stateful data.
resources:
  - name: tokens
    kind: collection
  - name: refresh_tokens
    kind: collection
  - name: codes
    kind: collection
  - name: videos
    kind: collection
  - name: playlists
    kind: collection
  - name: playlist_items
    kind: collection

# Auth scheme metadata (mock: bearer tokens validated against the tokens
# collection).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: resource_not_found
