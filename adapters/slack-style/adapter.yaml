# stunt adapter manifest — Slack-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of Slack's Web API for LOCAL TESTING
# ONLY. It does not call the real Slack API. All data is synthetic.
# See DISCLAIMER.
id: slack-style
name: "Slack-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Slack Web API"
  version: "1.0"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- auth ---
  - route: /api/auth.test
    method: POST
    handler: scripts/auth.star#on_auth_test

  # --- chat (stateful) ---
  - route: /api/chat.postMessage
    method: POST
    handler: scripts/chat.star#on_post_message

  # --- conversations (stateful) ---
  - route: /api/conversations.create
    method: POST
    handler: scripts/conversations.star#on_create_conversation
  - route: /api/conversations.list
    method: GET
    handler: scripts/conversations.star#on_list_conversations
  - route: /api/conversations.history
    method: GET
    handler: scripts/conversations.star#on_conversation_history

  # --- reactions ---
  - route: /api/reactions.add
    method: POST
    handler: scripts/reactions.star#on_add_reaction

# Backing stores — collections for stateful data.
resources:
  - name: channels
    kind: collection
  - name: messages
    kind: collection

# Auth scheme metadata: Bearer token (xoxb-...).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          ok: false
          error: "not_found"
