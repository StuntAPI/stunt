# stunt adapter manifest — Google Calendar API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Google Calendar API (v3) for
# LOCAL TESTING ONLY. It does not call the real Google API. All data is
# synthetic. See DISCLAIMER.
id: gcalendar-style
name: "Google Calendar API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Google Calendar API"
  version: "v3"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Calendar list + primary (literal routes first) ---
  - route: /calendar/v3/users/me/calendarList
    method: GET
    handler: scripts/calendars.star#on_list_calendars
  - route: /calendar/v3/calendars/primary
    method: GET
    handler: scripts/calendars.star#on_get_primary

  # --- Event creation helpers (literal sub-routes under events/) ---
  - route: /calendar/v3/calendars/{calendarId}/events/quickAdd
    method: POST
    handler: scripts/events.star#on_quick_add
  - route: /calendar/v3/calendars/{calendarId}/events/import
    method: POST
    handler: scripts/events.star#on_import

  # --- Events list (before events/{eventId}) ---
  - route: /calendar/v3/calendars/{calendarId}/events
    method: GET
    handler: scripts/events.star#on_list_events
  - route: /calendar/v3/calendars/{calendarId}/events
    method: POST
    handler: scripts/events.star#on_create_event

  # --- Event instances (7 segments, before events/{eventId}) ---
  - route: /calendar/v3/calendars/{calendarId}/events/{eventId}/instances
    method: GET
    handler: scripts/events.star#on_list_instances

  # --- Single event CRUD (6 segments) ---
  - route: /calendar/v3/calendars/{calendarId}/events/{eventId}
    method: GET
    handler: scripts/events.star#on_get_event
  - route: /calendar/v3/calendars/{calendarId}/events/{eventId}
    method: PATCH
    handler: scripts/events.star#on_patch_event
  - route: /calendar/v3/calendars/{calendarId}/events/{eventId}
    method: DELETE
    handler: scripts/events.star#on_delete_event

# Backing stores — collections for stateful data.
resources:
  - name: calendars
    kind: collection
  - name: events
    kind: collection

# Auth scheme metadata (mock: any Bearer token accepted).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            code: 404
            message: "Method not found."
            status: "NOT_FOUND"
