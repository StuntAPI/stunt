# stunt adapter manifest — Resend-style API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of a Resend-style email API for
# LOCAL TESTING ONLY. It does not call the real Resend API. All data is
# synthetic. See DISCLAIMER.
id: resend-style
name: "Resend-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Resend API"
  version: "1.0.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Send email ---
  - route: /emails
    method: POST
    handler: scripts/emails.star#on_send_email

  # --- List emails ---
  - route: /emails
    method: GET
    handler: scripts/emails.star#on_list_emails

  # --- Retrieve a single email ---
  - route: /emails/{id}
    method: GET
    handler: scripts/emails.star#on_get_email

# Backing stores — collections for stateful data.
resources:
  - name: emails
    kind: collection

# Auth scheme metadata (mock: accept any non-empty bearer key, like a dev key).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          statusCode: 404
          message: resource not found
          name: not_found
