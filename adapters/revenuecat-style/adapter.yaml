# stunt adapter manifest — RevenueCat-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of a RevenueCat-style REST API for
# LOCAL TESTING ONLY. It does not call the real RevenueCat API. All data is
# synthetic. See DISCLAIMER.
id: revenuecat-style
name: "RevenueCat-style API simulator (unofficial)"
version: "0.2.0"

api:
  name: "RevenueCat API"
  version: "v1"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Subscribers ---
  - route: /v1/subscribers/{app_user_id}
    method: GET
    handler: scripts/subscribers.star#on_get_subscriber
  - route: /v1/subscribers/{app_user_id}
    method: POST
    handler: scripts/subscribers.star#on_post_subscriber

  # --- Receipts ---
  - route: /v1/receipts
    method: POST
    handler: scripts/receipts.star#on_post_receipt

# Backing stores — collections for stateful data.
resources:
  - name: subscribers
    kind: collection
  - name: entitlements
    kind: collection

# Auth scheme metadata (mock: accept any non-empty bearer key, like a dev key).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          code: 404
          message: resource not found
