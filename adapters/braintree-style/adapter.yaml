# stunt adapter manifest — Braintree GraphQL + REST API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Braintree GraphQL + REST API
# for LOCAL TESTING ONLY. It does not call the real Braintree API. All data
# is synthetic. See DISCLAIMER.
id: braintree-style
name: "Braintree GraphQL + REST API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Braintree GraphQL + REST API"
  version: "2024-09-01"

# Auth: Bearer or public/private key.
identity:
  token_scheme: bearer

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- GraphQL (primary API) ---
  - route: /graphql
    method: POST
    handler: scripts/graphql.star#on_graphql

  # --- REST (alternative) ---
  - route: /merchants/{merchantId}/transactions
    method: POST
    handler: scripts/rest.star#on_create_transaction
  - route: /merchants/{merchantId}/transactions/{id}
    method: GET
    handler: scripts/rest.star#on_get_transaction
  - route: /merchants/{merchantId}/transactions/{id}/refund
    method: POST
    handler: scripts/rest.star#on_refund_transaction
  - route: /merchants/{merchantId}/payment_methods
    method: POST
    handler: scripts/rest.star#on_create_payment_method
  - route: /merchants/{merchantId}/client_token
    method: POST
    handler: scripts/rest.star#on_client_token

  # --- Webhooks (inbound) ---
  - route: /webhooks
    method: POST
    handler: scripts/webhooks.star#on_webhook

# Backing stores — collections for stateful data.
resources:
  - name: transactions
    kind: collection
  - name: customers
    kind: collection

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            message: "Not found"
