# stunt adapter manifest — WalletConnect v2 relay simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the WalletConnect Relay Protocol v2
# dApp-facing surface for LOCAL TESTING ONLY. It does not call the real
# WalletConnect relay or any real wallet. All data is synthetic. See DISCLAIMER.
id: walletconnect-style
name: "WalletConnect v2 relay simulator (unofficial)"
version: "0.1.0"

api:
  name: "WalletConnect (Relay Protocol v2)"
  version: "2.0"

# Endpoints — the dApp-facing pairing + session surface over a simulated relay.
endpoints:
  # --- Pairing ---
  - route: /v1/pairings
    method: POST
    handler: scripts/relay.star#on_create_pairing

  # --- Session lifecycle (stateful) ---
  - route: /v1/sessions
    method: POST
    handler: scripts/relay.star#on_propose_session
  - route: /v1/sessions
    method: GET
    handler: scripts/relay.star#on_list_sessions

  # --- Session actions (parameterized) ---
  - route: /v1/sessions/{topic}/approve
    method: POST
    handler: scripts/relay.star#on_approve_session
  - route: /v1/sessions/{topic}/request
    method: POST
    handler: scripts/relay.star#on_session_request
  - route: /v1/sessions/{topic}/extend
    method: POST
    handler: scripts/relay.star#on_extend_session
  - route: /v1/sessions/{topic}
    method: DELETE
    handler: scripts/relay.star#on_disconnect_session

# Backing stores — collections for stateful data.
resources:
  - name: pairings
    kind: collection
  - name: sessions
    kind: collection

# Auth: projectId check (the WC cloud project id).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: not_found
