# stunt adapter manifest — Shopify Admin-style API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of Shopify's Admin REST + GraphQL API
# (version 2024-10) for LOCAL TESTING ONLY. It does not call the real Shopify
# API. All data is synthetic. See DISCLAIMER.
id: shopify-style
name: "Shopify Admin-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Shopify Admin REST + GraphQL API"
  version: "2024-10"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- OAuth (token-obtaining flow; NO X-Shopify-Access-Token required) ---
  - route: /admin/oauth/authorize
    method: GET
    handler: scripts/oauth.star#on_authorize
  - route: /admin/oauth/access_token
    method: POST
    handler: scripts/oauth.star#on_access_token

  # --- Products REST (stateful CRUD) ---
  - route: /admin/api/2024-10/products.json
    method: GET
    handler: scripts/products.star#on_list_products
  - route: /admin/api/2024-10/products.json
    method: POST
    handler: scripts/products.star#on_create_product
  - route: /admin/api/2024-10/products/{product_id}
    method: GET
    handler: scripts/products.star#on_get_product
  - route: /admin/api/2024-10/products/{product_id}
    method: PUT
    handler: scripts/products.star#on_update_product
  - route: /admin/api/2024-10/products/{product_id}
    method: DELETE
    handler: scripts/products.star#on_delete_product

  # --- Orders REST (stateful) + fulfillments + transactions ---
  - route: /admin/api/2024-10/orders.json
    method: GET
    handler: scripts/orders.star#on_list_orders
  - route: /admin/api/2024-10/orders/{order_id}
    method: GET
    handler: scripts/orders.star#on_get_order
  - route: /admin/api/2024-10/orders/{order_id}/fulfillments.json
    method: POST
    handler: scripts/orders.star#on_create_fulfillment
  - route: /admin/api/2024-10/orders/{order_id}/transactions.json
    method: POST
    handler: scripts/orders.star#on_create_transaction

  # --- Customers REST ---
  - route: /admin/api/2024-10/customers.json
    method: GET
    handler: scripts/customers.star#on_list_customers

  # --- Webhooks REST (register + list) ---
  - route: /admin/api/2024-10/webhooks.json
    method: GET
    handler: scripts/webhooks.star#on_list_webhooks
  - route: /admin/api/2024-10/webhooks.json
    method: POST
    handler: scripts/webhooks.star#on_create_webhook

  # --- GraphQL (pattern-match common operations) ---
  - route: /admin/api/2024-10/graphql.json
    method: POST
    handler: scripts/graphql.star#on_graphql

# Backing stores — collections for stateful data.
resources:
  - name: products
    kind: collection
  - name: orders
    kind: collection
  - name: customers
    kind: collection
  - name: fulfillments
    kind: collection
  - name: transactions
    kind: collection
  - name: webhooks
    kind: collection
  - name: oauth_codes
    kind: collection

# Auth scheme metadata (Shopify REST uses X-Shopify-Access-Token header).
identity:
  token_scheme: custom

# Catch-all: any unmatched route returns a 404 in the Shopify error envelope.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors: "404: Not Found"
