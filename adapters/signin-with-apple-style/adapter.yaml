# stunt adapter manifest — Sign in with Apple simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of Apple's Sign in with Apple OAuth2
# API for LOCAL TESTING ONLY. It does not call the real Apple API. All data
# is synthetic. See DISCLAIMER.
id: signin-with-apple-style
name: "Sign in with Apple simulator (unofficial)"
version: "0.1.0"

api:
  name: "Sign in with Apple"
  version: "v2"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes.
endpoints:
  # --- OAuth2 ---
  - route: /auth/authorize
    method: GET
    handler: scripts/oauth.star#on_authorize
  - route: /auth/token
    method: POST
    handler: scripts/oauth.star#on_token
  - route: /auth/keys
    method: GET
    handler: scripts/oauth.star#on_get_keys

# Backing stores — collections for stateful data.
resources:
  - name: auth_codes
    kind: collection
  - name: tokens
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: oauth2_jwt

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: "invalid_request"
          error_description: "The endpoint does not exist."
