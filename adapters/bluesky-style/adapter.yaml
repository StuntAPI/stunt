# stunt adapter manifest — Bluesky-style AT Protocol API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of a Bluesky (AT Protocol) XRPC API
# for LOCAL TESTING ONLY. It does not call the real Bluesky API. All data is
# synthetic. See DISCLAIMER.
id: bluesky-style
name: "Bluesky-style AT Protocol API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Bluesky AT Protocol"
  version: "com.atproto (2024-Q4)"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Session (XRPC) ---
  - route: /xrpc/com.atproto.server.createSession
    method: POST
    handler: scripts/session.star#on_create_session

  # --- Records (XRPC; Bearer required for writes) ---
  - route: /xrpc/com.atproto.repo.createRecord
    method: POST
    handler: scripts/records.star#on_create_record
  - route: /xrpc/com.atproto.repo.deleteRecord
    method: POST
    handler: scripts/records.star#on_delete_record

  # --- Identity (XRPC; public reads) ---
  - route: /xrpc/com.atproto.identity.resolveHandle
    method: GET
    handler: scripts/identity.star#on_resolve_handle

  # --- App views (XRPC; public reads) ---
  - route: /xrpc/app.bsky.actor.getProfile
    method: GET
    handler: scripts/profile.star#on_get_profile
  - route: /xrpc/app.bsky.feed.searchPosts
    method: GET
    handler: scripts/search.star#on_search_posts

# Backing stores — collections for stateful data.
resources:
  - name: sessions
    kind: collection
  - name: posts
    kind: collection

# Auth scheme metadata (mock: createSession mints a JWT; subsequent calls
# send Authorization: Bearer <jwt>).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: NotFound
          message: "Not found"
