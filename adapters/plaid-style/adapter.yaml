# stunt adapter manifest — Plaid-style API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Plaid API for LOCAL TESTING
# ONLY. It does not call the real Plaid API. All data is synthetic. See
# DISCLAIMER.
id: plaid-style
name: "Plaid-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Plaid API"
  version: "2020-09-14"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- Link token ---
  - route: /link/token/create
    method: POST
    handler: scripts/link.star#on_create_link_token

  # --- Item exchange ---
  - route: /item/public_token/exchange
    method: POST
    handler: scripts/item.star#on_exchange_public_token

  # --- Accounts ---
  - route: /accounts/balance/get
    method: POST
    handler: scripts/accounts.star#on_get_balances
  - route: /accounts/get
    method: POST
    handler: scripts/accounts.star#on_get_accounts

  # --- Transactions sync (cursor-based pagination) ---
  - route: /transactions/sync
    method: POST
    handler: scripts/transactions.star#on_sync

  # --- Identity ---
  - route: /identity/get
    method: POST
    handler: scripts/identity.star#on_get_identity

  # --- Item management ---
  - route: /item/get
    method: POST
    handler: scripts/item.star#on_get_item
  - route: /item/remove
    method: POST
    handler: scripts/item.star#on_remove_item

# Backing stores — collections for stateful data.
resources:
  - name: items
    kind: collection
    seed: fixtures/items.jsonl
  - name: accounts
    kind: collection
    seed: fixtures/accounts.jsonl
  - name: transactions
    kind: collection
    seed: fixtures/transactions.jsonl
  - name: public_tokens
    kind: collection
  - name: access_tokens
    kind: collection
  - name: link_tokens
    kind: collection

# Auth scheme: Plaid accepts creds in the body (client_id + secret) or as
# "Authorization: Bearer <client_id>_<secret>". Presence is checked, not
# validated against real Plaid credentials.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            error_type: "INVALID_REQUEST"
            error_code: "INVALID_BODY"
            error_message: "not found"
            display_message: None
