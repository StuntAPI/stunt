# stunt adapter manifest — Marketo Engage REST API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Marketo Engage REST API (v1.0)
# for LOCAL TESTING ONLY. It does not call the real Marketo API. All data is
# synthetic. See DISCLAIMER.
id: marketo-style
name: "Marketo Engage REST API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Marketo Engage REST API"
  version: "1.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- OAuth token mint ---
  - route: /identity/oauth/token
    method: GET
    handler: scripts/auth.star#on_token

  # --- Leads ---
  - route: /rest/v1/leads.json
    method: POST
    handler: scripts/leads.star#on_sync_leads
  - route: /rest/v1/leads
    method: GET
    handler: scripts/leads.star#on_list_leads
  - route: /rest/v1/leads
    method: POST
    handler: scripts/leads.star#on_create_lead
  - route: /rest/v1/leads/{id}
    method: GET
    handler: scripts/leads.star#on_get_lead
  - route: /rest/v1/leads/{id}.json
    method: GET
    handler: scripts/leads.star#on_get_lead_json

  # --- Campaigns ---
  - route: /rest/v1/campaigns/{id}/trigger
    method: POST
    handler: scripts/campaigns.star#on_trigger
  - route: /rest/v1/campaigns
    method: GET
    handler: scripts/campaigns.star#on_list

  # --- Programs ---
  - route: /rest/v1/programs
    method: GET
    handler: scripts/programs.star#on_list_programs

  # --- Folders ---
  - route: /rest/v1/folders
    method: GET
    handler: scripts/programs.star#on_list_folders

  # --- Activities (cursor-paginated with paging tokens) ---
  - route: /rest/v1/activities/pagingtoken
    method: GET
    handler: scripts/activities.star#on_paging_token
  - route: /rest/v1/activities
    method: GET
    handler: scripts/activities.star#on_list_activities

# Backing stores — collections for stateful data.
resources:
  - name: leads
    kind: collection
    seed: fixtures/leads.jsonl
  - name: campaigns
    kind: collection
    seed: fixtures/campaigns.jsonl
  - name: programs
    kind: collection
    seed: fixtures/programs.jsonl
  - name: folders
    kind: collection
    seed: fixtures/folders.jsonl
  - name: activities
    kind: collection
    seed: fixtures/activities.jsonl
  - name: tokens
    kind: collection

# Auth scheme: Bearer token or ?access_token= query param.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          success: false
          requestId: "synthetic"
          errors:
            - code: "604"
              message: "Resource not found"
