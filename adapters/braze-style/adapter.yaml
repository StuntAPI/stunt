# stunt adapter manifest — Braze REST API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Braze REST API (v2.0) for LOCAL
# TESTING ONLY. It does not call the real Braze API. All data is synthetic.
# See DISCLAIMER.
id: braze-style
name: "Braze REST API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Braze REST API"
  version: "2.0"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- Messages ---
  - route: /messages/send
    method: POST
    handler: scripts/messages.star#on_send

  # --- Users ---
  - route: /users/track
    method: POST
    handler: scripts/users.star#on_track
  - route: /users/alias/new
    method: POST
    handler: scripts/users.star#on_alias_new
  - route: /users/identify
    method: POST
    handler: scripts/users.star#on_identify

  # --- Campaigns ---
  - route: /campaigns/trigger/send
    method: POST
    handler: scripts/campaigns.star#on_trigger_send

  # --- Segments ---
  - route: /segments/list
    method: GET
    handler: scripts/segments.star#on_list_segments

  # --- Scheduled messages ---
  - route: /messages/scheduled
    method: GET
    handler: scripts/messages.star#on_scheduled

# Backing stores — collections for stateful data.
resources:
  - name: users
    kind: collection
  - name: campaigns
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          message: "not found"
