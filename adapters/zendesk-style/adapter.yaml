# stunt adapter manifest — Zendesk REST API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Zendesk REST API (v2) for
# LOCAL TESTING ONLY. It does not call the real Zendesk API. All data is
# synthetic. See DISCLAIMER.
id: zendesk-style
name: "Zendesk REST API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Zendesk REST API"
  version: "2"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Tickets ---
  - route: /api/v2/tickets
    method: GET
    handler: scripts/tickets.star#on_list
  - route: /api/v2/tickets
    method: POST
    handler: scripts/tickets.star#on_create
  - route: /api/v2/tickets/{id}/comments
    method: POST
    handler: scripts/tickets.star#on_add_comment
  - route: /api/v2/tickets/{id}/comments
    method: GET
    handler: scripts/tickets.star#on_list_comments
  - route: /api/v2/tickets/{id}/tags
    method: POST
    handler: scripts/tickets.star#on_set_tags
  - route: /api/v2/tickets/{id}
    method: GET
    handler: scripts/tickets.star#on_get
  - route: /api/v2/tickets/{id}
    method: PUT
    handler: scripts/tickets.star#on_update

  # --- Users ---
  - route: /api/v2/users
    method: GET
    handler: scripts/users.star#on_list_users

  # --- Organizations ---
  - route: /api/v2/organizations
    method: GET
    handler: scripts/users.star#on_list_organizations

  # --- Groups ---
  - route: /api/v2/groups
    method: GET
    handler: scripts/users.star#on_list_groups

  # --- Search ---
  - route: /api/v2/search.json
    method: GET
    handler: scripts/tickets.star#on_search

  # --- Requests (end-user) ---
  - route: /api/v2/requests
    method: GET
    handler: scripts/tickets.star#on_list_requests

  # --- Views + Triggers ---
  - route: /api/v2/views
    method: GET
    handler: scripts/users.star#on_list_views
  - route: /api/v2/triggers
    method: GET
    handler: scripts/users.star#on_list_triggers

  # --- Webhooks ---
  - route: /api/v2/webhooks
    method: GET
    handler: scripts/webhooks.star#on_list_webhooks
  - route: /api/v2/webhooks
    method: POST
    handler: scripts/webhooks.star#on_create_webhook

  # --- Suspended tickets ---
  - route: /api/v2/suspended_tickets
    method: GET
    handler: scripts/tickets.star#on_list_suspended

# Backing stores — collections for stateful data.
resources:
  - name: tickets
    kind: collection
    seed: fixtures/tickets.jsonl
  - name: comments
    kind: collection
  - name: users
    kind: collection
    seed: fixtures/users.jsonl
  - name: organizations
    kind: collection
    seed: fixtures/organizations.jsonl
  - name: groups
    kind: collection
    seed: fixtures/groups.jsonl
  - name: tags
    kind: collection
  - name: webhooks
    kind: collection

# Auth scheme: Basic (email/token) or Bearer.
identity:
  token_scheme: basic

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: "RecordNotFound"
          description: "Not found"
