# stunt adapter manifest — Product Hunt-style GraphQL API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of a Product Hunt GraphQL API
# for LOCAL TESTING ONLY. It does not call the real Product Hunt API. All
# data is synthetic. See DISCLAIMER.
id: producthunt-style
name: "Product Hunt-style GraphQL API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Product Hunt GraphQL API"
  version: "2"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- GraphQL (single endpoint; pattern-matches operation) ---
  - route: /v2/api/graphql.json
    method: POST
    handler: scripts/graphql.star#on_graphql

# Backing stores — collections for stateful data.
resources:
  - name: posts
    kind: collection

# Auth scheme metadata (mock: bearer token check).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors:
            - message: "Not found"
