# stunt adapter manifest — Google Cloud IAM + Service Accounts API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Google Cloud IAM API (v1)
# including service accounts, JWT-bearer token exchange, and domain-wide
# delegation, for LOCAL TESTING ONLY. It does not call the real Google API.
# All data is synthetic. See DISCLAIMER.
id: google-iam-style
name: "Google Cloud IAM + Service Accounts API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Google Cloud IAM API + Service Accounts"
  version: "v1"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- OAuth2 JWT-bearer token exchange (service account) ---
  - route: /oauth2/v4/token
    method: POST
    handler: scripts/oauth.star#on_jwt_exchange

  # --- Service Accounts CRUD ---
  - route: /v1/projects/{project}/serviceAccounts
    method: GET
    handler: scripts/service_accounts.star#on_list_service_accounts
  - route: /v1/projects/{project}/serviceAccounts
    method: POST
    handler: scripts/service_accounts.star#on_create_service_account

  # --- Service Account actions (parameterized by SA email) ---
  # {sa} captures "<projectId>@<projectId>.iam.gserviceaccount.com"
  - route: /v1/projects/{project}/serviceAccounts/{sa}
    method: GET
    handler: scripts/service_accounts.star#on_get_service_account
  - route: /v1/projects/{project}/serviceAccounts/{sa}
    method: DELETE
    handler: scripts/service_accounts.star#on_delete_service_account
  - route: /v1/projects/{project}/serviceAccounts/{sa}/keys
    method: GET
    handler: scripts/service_accounts.star#on_list_keys
  # The ":generateAccessToken" verb suffix is on the same path segment as {sa}.
  # Route matching splits on "/", so we capture the full segment and dispatch.
  - route: /v1/projects/{project}/serviceAccounts/{sa_verb}
    method: POST
    handler: scripts/service_accounts.star#on_sa_post_dispatch

  # --- IAM Roles query ---
  - route: /v1/projects/{project}/roles:queryGrantableRoles
    method: POST
    handler: scripts/roles.star#on_query_grantable_roles

# Backing stores — collections for stateful data.
resources:
  - name: tokens
    kind: collection
  - name: service_accounts
    kind: collection
  - name: sa_keys
    kind: collection

# Auth scheme metadata (mock: bearer tokens validated against the tokens
# collection).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            code: 404
            message: "Method not found."
            status: "NOT_FOUND"
