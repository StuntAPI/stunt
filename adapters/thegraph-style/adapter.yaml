# stunt adapter manifest — The Graph subgraph GraphQL simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of a The Graph subgraph GraphQL
# endpoint for LOCAL TESTING ONLY. It does not call any real Graph node or
# index any real blockchain data. All data is synthetic. See DISCLAIMER.
id: thegraph-style
name: "The Graph subgraph GraphQL simulator (unofficial)"
version: "0.1.0"

api:
  name: "The Graph (GraphQL over subgraphs)"
  version: "1.0"

# Endpoints — each subgraph is served at /subgraphs/id/<id>.
endpoints:
  # GraphQL query endpoint.
  - route: /subgraphs/id/{subgraphId}
    method: POST
    handler: scripts/graphql.star#on_query
  # GraphQL schema/introspection (SDL).
  - route: /subgraphs/id/{subgraphId}/graphql
    method: GET
    handler: scripts/graphql.star#on_schema

# Backing stores — collections for stateful seeded entity data.
resources:
  - name: pools
    kind: collection
  - name: tokens
    kind: collection
  - name: domains
    kind: collection

# Catch-all: any unmatched route returns 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors: [{ message: "not found" }]
