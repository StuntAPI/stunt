# stunt adapter manifest — Google Admin SDK Directory API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Google Admin SDK Directory API
# (directory_v1) for LOCAL TESTING ONLY. It does not call the real Google API.
# All data is synthetic. See DISCLAIMER.
id: google-admin-style
name: "Google Admin SDK Directory API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Google Admin SDK Directory API"
  version: "directory_v1"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Users CRUD ---
  - route: /admin/directory/v1/users
    method: GET
    handler: scripts/users.star#on_list_users
  - route: /admin/directory/v1/users
    method: POST
    handler: scripts/users.star#on_create_user
  - route: /admin/directory/v1/users/{userKey}
    method: GET
    handler: scripts/users.star#on_get_user
  - route: /admin/directory/v1/users/{userKey}
    method: PUT
    handler: scripts/users.star#on_update_user
  - route: /admin/directory/v1/users/{userKey}
    method: DELETE
    handler: scripts/users.star#on_delete_user

  # --- User OAuth tokens ---
  - route: /admin/directory/v1/users/{userKey}/tokens
    method: GET
    handler: scripts/users.star#on_list_tokens

  # --- Groups CRUD ---
  - route: /admin/directory/v1/groups
    method: GET
    handler: scripts/groups.star#on_list_groups
  - route: /admin/directory/v1/groups
    method: POST
    handler: scripts/groups.star#on_create_group
  - route: /admin/directory/v1/groups/{groupKey}
    method: GET
    handler: scripts/groups.star#on_get_group

  # --- Group members ---
  - route: /admin/directory/v1/groups/{groupKey}/members
    method: GET
    handler: scripts/groups.star#on_list_members
  - route: /admin/directory/v1/groups/{groupKey}/members
    method: POST
    handler: scripts/groups.star#on_add_member

# Backing stores — collections for stateful data.
resources:
  - name: tokens
    kind: collection
  - name: users
    kind: collection
  - name: groups
    kind: collection
  - name: members
    kind: collection
  - name: user_tokens
    kind: collection

# Auth scheme metadata (mock: bearer tokens validated against the tokens
# collection — models the Workspace super-admin gate).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            code: 404
            message: "Resource not found."
            errors:
              - message: "Resource not found."
                domain: "global"
                reason: "notFound"
