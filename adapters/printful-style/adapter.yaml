# stunt adapter manifest — Printful-style API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of a Printful-style print-on-demand API
# for LOCAL TESTING ONLY. It does not call the real Printful API. All data is
# synthetic. See DISCLAIMER.
id: printful-style
name: "Printful-style API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Printful API"
  version: "v2"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Store products ---
  - route: /v2/store/products
    method: GET
    handler: scripts/products.star#on_list_products
  - route: /v2/store/products
    method: POST
    handler: scripts/products.star#on_create_product
  - route: /v2/store/products/{product_id}
    method: GET
    handler: scripts/products.star#on_get_product

  # --- Orders (v1, result-wrapped) ---
  - route: /orders
    method: POST
    handler: scripts/orders.star#on_create_v1_order
  - route: /orders/{order_id}
    method: GET
    handler: scripts/orders.star#on_get_v1_order

  # --- Store orders (v2) ---
  - route: /v2/store/orders
    method: GET
    handler: scripts/orders.star#on_list_orders
  - route: /v2/store/orders
    method: POST
    handler: scripts/orders.star#on_create_order
  - route: /v2/store/orders/{order_id}
    method: POST
    handler: scripts/orders.star#on_update_order

  # --- Shipping rates ---
  - route: /v2/shipping/rates
    method: POST
    handler: scripts/shipping.star#on_shipping_rates

# Backing stores — collections for stateful data.
resources:
  - name: products
    kind: collection
  - name: orders
    kind: collection

# Auth scheme metadata (mock: accept any non-empty bearer key).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            message: resource not found
            code: 404
