# stunt adapter manifest — Google Analytics GA4 Data API + Admin API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Google Analytics Data API (v1beta)
# and Admin API (v1admin) for LOCAL TESTING ONLY. It does not call the real
# Google API. All data is synthetic. See DISCLAIMER.
id: ga4-style
name: "Google Analytics GA4 Data API + Admin API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Google Analytics Data API + Admin API"
  version: "v1beta"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Admin API: account/property/stream hierarchy ---
  - route: /v1admin/accounts
    method: GET
    handler: scripts/admin.star#on_list_accounts
  - route: /v1admin/properties
    method: GET
    handler: scripts/admin.star#on_list_properties
  - route: /v1admin/properties/{property}/dataStreams
    method: GET
    handler: scripts/admin.star#on_list_datastreams

  # --- Data API: reports ---
  # The Google API convention uses ":runReport" as a verb suffix on the
  # resource path. Since route matching splits on "/", we capture the full
  # segment and dispatch inside the handler.
  - route: /v1beta/properties/{resource}
    method: POST
    handler: scripts/data.star#on_data

# Backing stores — collections for stateful data.
resources:
  - name: tokens
    kind: collection
  - name: accounts
    kind: collection
  - name: properties
    kind: collection
  - name: datastreams
    kind: collection

# Auth scheme metadata (mock: bearer tokens validated against the tokens
# collection).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            code: 404
            message: "Method not found."
            status: "NOT_FOUND"
