# stunt adapter manifest — Hacker News-style Firebase API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Hacker News Firebase-style REST API
# for LOCAL TESTING ONLY. It does not call the real HN API. All data is
# synthetic. See DISCLAIMER.
id: hn-style
name: "Hacker News-style Firebase API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Hacker News Firebase API"
  version: "v0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Story lists (literal) ---
  - route: /v0/topstories.json
    method: GET
    handler: scripts/stories.star#on_topstories
  - route: /v0/newstories.json
    method: GET
    handler: scripts/stories.star#on_newstories
  - route: /v0/beststories.json
    method: GET
    handler: scripts/stories.star#on_beststories
  - route: /v0/askstories.json
    method: GET
    handler: scripts/stories.star#on_askstories
  - route: /v0/showstories.json
    method: GET
    handler: scripts/stories.star#on_showstories
  - route: /v0/jobstories.json
    method: GET
    handler: scripts/stories.star#on_jobstories

  # --- Auth (login → session cookie, mirrors ***REMOVED*** mock_hn) ---
  - route: /login
    method: POST
    handler: scripts/auth.star#on_login
  - route: /logout
    method: GET
    handler: scripts/auth.star#on_logout

  # --- Submit (session cookie required; challenge injection after N) ---
  - route: /submit
    method: POST
    handler: scripts/submit.star#on_submit

  # --- Items (parameterized; {id} captures "<n>.json") ---
  - route: /v0/item/{id}
    method: GET
    handler: scripts/items.star#on_get_item

  # --- Users (parameterized; {id} captures "<handle>.json") ---
  - route: /v0/user/{id}
    method: GET
    handler: scripts/users.star#on_get_user

# Backing stores — collections for stateful data.
resources:
  - name: items
    kind: collection
    seed: fixtures/items.jsonl
  - name: users
    kind: collection
    seed: fixtures/users.jsonl
  - name: sessions
    kind: collection

# Auth scheme metadata (mock: session cookie for writes; reads are public).
identity:
  token_scheme: cookie

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: "Item not found."
