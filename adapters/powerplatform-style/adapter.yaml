# stunt adapter manifest — Microsoft Power Platform API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the Microsoft Power Platform API (v2)
# for LOCAL TESTING ONLY. It does not call the real Microsoft API. All data is
# synthetic. See DISCLAIMER.
id: powerplatform-style
name: "Microsoft Power Platform API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Microsoft Power Platform API"
  version: "2"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Environments ---
  - route: /v2/environments
    method: GET
    handler: scripts/environments.star#on_list_environments

  # --- Connectors (literal 5th segment) ---
  - route: /v2/environments/{env}/connectors
    method: GET
    handler: scripts/connectors.star#on_list_connectors

  # --- Dataverse accounts (literal path) ---
  - route: /v2/environments/{env}/api/data/v9.2/accounts
    method: GET
    handler: scripts/dataverse.star#on_list_accounts

  # --- Flows (literal 5th segment) ---
  - route: /v2/environments/{env}/flows
    method: GET
    handler: scripts/flows.star#on_list_flows
  - route: /v2/environments/{env}/flows
    method: POST
    handler: scripts/flows.star#on_create_flow

# Backing stores — collections for stateful data.
resources:
  - name: environments
    kind: collection
  - name: flows
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error:
            code: "NotFound"
            message: "Resource not found."
