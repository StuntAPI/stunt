# stunt adapter manifest — Apple Music API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Apple Music API (1.0) for
# LOCAL TESTING ONLY. It does not call the real Apple API. All data is
# synthetic. See DISCLAIMER.
id: apple-music-style
name: "Apple Music API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Apple Music API"
  version: "1.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Catalog: search (literal 4th segment) ---
  - route: /v1/catalog/{storefront}/search
    method: GET
    handler: scripts/catalog.star#on_search

  # --- Catalog: songs (4th segment literal, 5th param) ---
  - route: /v1/catalog/{storefront}/songs/{id}
    method: GET
    handler: scripts/catalog.star#on_get_song

  # --- Catalog: albums (4th segment literal, 5th param) ---
  - route: /v1/catalog/{storefront}/albums/{id}
    method: GET
    handler: scripts/catalog.star#on_get_album

  # --- User library (literal path) ---
  - route: /v1/me/library/songs
    method: GET
    handler: scripts/library.star#on_library_songs

# Backing stores — collections for stateful data.
resources:
  - name: songs
    kind: collection
  - name: albums
    kind: collection
  - name: library_songs
    kind: collection

# Auth scheme metadata.
identity:
  token_scheme: bearer_jwt

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors:
            - status: "404"
              code: "not-found"
              title: "The specified resource was not found."
