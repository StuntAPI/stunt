# stunt adapter manifest — Google OAuth2 API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of Google's OAuth2 surface for LOCAL
# TESTING ONLY. It does not call the real Google API. All data is synthetic.
# See DISCLAIMER.
id: google-style
name: "Google OAuth2 API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Google OAuth2 API"
  version: "v2"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- OAuth2 ---
  - route: /o/oauth2/auth
    method: GET
    handler: scripts/oauth.star#on_authorize
  - route: /o/oauth2/token
    method: POST
    handler: scripts/oauth.star#on_token

  # --- Userinfo ---
  - route: /oauth2/v3/userinfo
    method: GET
    handler: scripts/userinfo.star#on_userinfo

# Backing stores — collections for stateful data.
resources:
  - name: tokens
    kind: collection
  - name: refresh_tokens
    kind: collection
  - name: codes
    kind: collection

# Auth scheme metadata (mock: bearer tokens validated against the tokens
# collection).
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: resource_not_found
