# stunt adapter manifest — Workday REST API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of Workday's REST API (v40.0) for
# LOCAL TESTING ONLY. It does not call the real Workday API. All data is
# synthetic. See DISCLAIMER.
id: workday-style
name: "Workday REST API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Workday REST API"
  version: "v40.0"

# Endpoints — each maps a route + method to a Starlark handler.
# NOTE: literal routes must come BEFORE parameterized routes so they are
# matched first (the dispatch engine checks in declaration order).
endpoints:
  # --- Staffing: workers ---
  - route: /wbs/v40.0/staffing/workers
    method: GET
    handler: scripts/workers.star#on_list_workers
  - route: /wbs/v40.0/staffing/workers/{id}
    method: GET
    handler: scripts/workers.star#on_get_worker

  # --- Compensation ---
  - route: /wbs/v40.0/compensation/workers/{id}/compensation
    method: GET
    handler: scripts/compensation.star#on_worker_compensation

  # --- Payroll ---
  - route: /wbs/v40.0/payroll/pay_components
    method: GET
    handler: scripts/payroll.star#on_pay_components

  # --- Human Resources: positions ---
  - route: /wbs/v40.0/human_resources/positions
    method: GET
    handler: scripts/hr.star#on_positions

  # --- Financials: accounts ---
  - route: /wbs/v40.0/financials/accounts
    method: GET
    handler: scripts/financials.star#on_accounts

  # --- RaaS / Custom Reports (ccx endpoints) ---
  - route: /ccx/v1/{tenant}/RaaS/Custom_Report
    method: GET
    handler: scripts/raas.star#on_custom_report
  - route: /ccx/v1/{tenant}/staffing/Create_Worker
    method: POST
    handler: scripts/raas.star#on_create_worker

# Backing stores — collections for stateful data.
resources:
  - name: workers
    kind: collection
    seed: fixtures/workers.jsonl
  - name: positions
    kind: collection
    seed: fixtures/positions.jsonl
  - name: accounts
    kind: collection
    seed: fixtures/accounts.jsonl
  - name: payComponents
    kind: collection
    seed: fixtures/payComponents.jsonl

# Auth scheme metadata: OAuth bearer or Basic auth.
identity:
  token_scheme: bearer

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          errors:
            - errorCode: "RESOURCE_NOT_FOUND"
              errorDescription: "The requested resource does not exist."
