# stunt adapter manifest — Adyen Checkout + Notification API simulator (unofficial)
# Docs: https://stuntapi.com/stunt
#
# This adapter mimics the *structure* of the Adyen Checkout + Notification
# API for LOCAL TESTING ONLY. It does not call the real Adyen API. All data
# is synthetic. See DISCLAIMER.
id: adyen-style
name: "Adyen Checkout + Notification API simulator (unofficial)"
version: "0.1.0"

api:
  name: "Adyen Checkout + Notification API"
  version: "v68"

# Endpoints — each maps a route + method to a Starlark handler.
endpoints:
  # --- Payments ---
  - route: /v68/payments
    method: POST
    handler: scripts/payments.star#on_create_payment
  - route: /v68/payments
    method: GET
    handler: scripts/payments.star#on_list_payments

  # --- Payment lifecycle (modifications) ---
  - route: /v68/payments/{paymentPspReference}/captures
    method: POST
    handler: scripts/payments.star#on_capture
  - route: /v68/payments/{paymentPspReference}/refunds
    method: POST
    handler: scripts/payments.star#on_refund
  - route: /v68/payments/{paymentPspReference}/reversals
    method: POST
    handler: scripts/payments.star#on_reversal
  - route: /v68/payments/{paymentPspReference}/cancels
    method: POST
    handler: scripts/payments.star#on_cancel

  # --- Notifications (Adyen sends HMAC-signed notifications to merchant) ---
  # This endpoint simulates the merchant-side notification receiver that
  # Adyen would POST to. It accepts [accepted] and documents the HMAC scheme.
  - route: /v68/notifications/test
    method: POST
    handler: scripts/notifications.star#on_notification

# Backing stores — collections for stateful data.
resources:
  - name: payments
    kind: collection
  - name: modifications
    kind: collection

# Auth scheme: Adyen uses X-API-Key header for Checkout API. We check
# presence, not real credential validation.
identity:
  token_scheme: api_key

# Catch-all: any unmatched route returns a 404.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          status: 404
          errorCode: "010"
          message: "Not found"
          errorType: "validation"
