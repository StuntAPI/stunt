# stunt adapter manifest — AWS IAM/STS-style API simulator (unofficial)
# Docs: https://github.com/stunt-adapters/stunt
#
# This adapter mimics the *structure* of the AWS IAM and STS
# (Security Token Service) query APIs for LOCAL TESTING ONLY. It does not
# call the real AWS API. All data is synthetic. See DISCLAIMER.
id: aws-iam-sts-style
name: "AWS IAM + STS API simulator (unofficial)"
version: "0.1.0"

api:
  name: "AWS STS + IAM API"
  version: "2011-06-15"

# Endpoints — each maps a route + method to a Starlark handler.
#
# AWS IAM/STS is a QUERY-API: the operation is selected by the `Action`
# query parameter (e.g. ?Action=AssumeRole&Version=2011-06-15). Both GET
# (query string) and POST (form-encoded body) carry the same Action.
# Responses are XML (Content-Type: text/xml).
#
# The root route "/" accepts both GET and POST; the handler dispatches on
# the Action parameter.
endpoints:
  # Root: all STS and IAM actions via ?Action=...&Version=...
  - route: /
    method: GET
    handler: scripts/sts.star#on_dispatch
  - route: /
    method: POST
    handler: scripts/sts.star#on_dispatch

# Backing stores — collections for stateful data.
resources:
  - name: temp_credentials
    kind: collection
  - name: roles
    kind: collection
  - name: users
    kind: collection
  - name: access_keys
    kind: collection

# Auth scheme: SigV4 (AWS4-HMAC-SHA256). Structural validation only for v1.
identity:
  token_scheme: custom

# Catch-all: any unmatched route returns an AWS-style XML error.
rules:
  - name: catchall-404
    match: { path: "/**" }
    respond:
      status: 404
      body:
        inline:
          error: resource_not_found

# Resources notes:
# - temp_credentials: {accessKeyId, secretAccessKey, sessionToken, expiration,
#                       arn, assumedRoleId, type}
# - roles: {roleName, arn, path, assumeRolePolicyDocument}
# - users: {userName, arn, userId}
# - access_keys: {userName, accessKeyId, status}
