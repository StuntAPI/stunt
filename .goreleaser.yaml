# GoReleaser configuration for stunt.
# Docs: https://goreleaser.com
#
# Module path (vanity): stuntapi.com/stunt  →  https://github.com/stuntapi/stunt
# Build the release locally (no publish) with:
#     env -u GOROOT goreleaser build --clean
# Full snapshot (no tag required, no publish):
#     env -u GOROOT goreleaser release --snapshot --clean
# Validate this file:
#     goreleaser check

version: 2

project_name: stunt

# Mark the current repo as the source of truth for the stuntapi.com/stunt vanity
# module path. GoReleaser runs `go build` in-tree, so this is informational.
gomod:
  proxy: true
  mod: mod

before:
  hooks:
    - go mod tidy

metadata:
  mod_timestamp: "{{.CommitTimestamp}}"

builds:
  - id: stunt
    main: ./cmd/stunt
    binary: stunt
    # Pure-Go (modernc.org/sqlite is CGO-free) → static, portable binaries.
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X stuntapi.com/stunt/internal/cli.Version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # All six targets ship. modernc.org/sqlite is pure-Go (CGO off) so even
    # windows/arm64 (Surface Pro, Copilot+ PCs) cross-compiles cleanly.
    # Confirmed by `just ci` cross-compile matrix + the v0.1.0 release.

archives:
  - id: default
    ids: [stunt]
    # tarball on unix, zip on windows (GoReleaser default), with a clean name.
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
      - adapters/DISCLAIMER.template

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: default
    artifacts: archive

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "New features"
      regexp: "^.*feat[(\\w]?:.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w]?:.*$"
      order: 1
    - title: "Other"
      order: 999

release:
  github:
    owner: stuntapi
    name: stunt
  draft: true
  prerelease: auto
  name_template: "stunt {{.Version}}"
  header: |
    ## stunt {{.Version}}

    **stunt** turns public-facing APIs into local simulators so you can develop
    and test client code without remote accounts or network access.

# Homebrew (macOS): GoReleaser generates a Cask and pushes it to
# stuntapi/homebrew-tap on release. Install with:
#     brew install --cask stuntapi/tap/stunt
# NOTE: GoReleaser removed `brews` (Formulas) in v2.16 in favour of Casks.
# Casks are macOS-only, so Linux/Windows users install via `go install`
# (stuntapi.com/stunt/cmd/stunt@latest) or the release tarball/zip.
homebrew_casks:
  - name: stunt
    homepage: "https://stuntapi.com"
    description: "Local simulators for public APIs — mock/stub servers for testing without remote accounts."
    license: "Apache-2.0"
    binaries: [stunt]
    # stunt is an unsigned Go binary → strip macOS Gatekeeper quarantine on install.
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/stunt"]
    repository:
      owner: stuntapi
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    # Helps `brew audit` pass when homepage differs from the download domain.
    url:
      verified: "github.com/stuntapi/stunt"
    caveats: |
      stunt is a local-only testing tool. Reference adapters ("*-style") are
      unofficial, synthetic-data simulators, not affiliated with any provider.

# Windows: winget manifests. GoReleaser generates StuntAPI.Stunt manifests and
# pushes them to stuntapi/winget on release. Install from a manifest:
#     winget install --manifest <manifest-dir-or-url>
# (Default-source `winget install StuntAPI.Stunt` follows once the manifest is
#  submitted to microsoft/winget-pkgs — see docs/RELEASING.md.)
winget:
  - name: stunt
    package_identifier: StuntAPI.Stunt
    publisher: StuntAPI
    publisher_url: https://stuntapi.com
    homepage: https://stuntapi.com
    short_description: "Local simulators for public APIs — mock servers for testing without remote accounts."
    description: "stunt turns public-facing APIs into local simulators (mock/stub servers) so you can develop and test client code without creating remote accounts, provisioning cloud resources, or hitting the network."
    license: Apache-2.0
    license_url: https://github.com/stuntapi/stunt/blob/main/LICENSE
    copyright: Copyright (c) The Stunt Authors
    tags: [mock, testing, api, simulator, stub, development]
    repository:
      owner: stuntapi
      name: winget
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    # Reference the windows zip archives (portable install — no MSI).
    ids:
      - default
    skip_upload: auto

# The Go module lives at the vanity path stuntapi.com/stunt (not the GitHub URL).
# Reference it in docs/issues:
#   go install stuntapi.com/stunt/cmd/stunt@latest
