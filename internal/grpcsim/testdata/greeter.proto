syntax = "proto3";

package stunt.test;

option go_package = "github.com/stunt-adapters/stunt/internal/grpcsim/testdata;grpcsim_test";

// Greeter is a minimal service used to exercise dynamic gRPC serving.
service Greeter {
  rpc SayHello(HelloRequest) returns (HelloReply);
}

message HelloRequest {
  string name = 1;
}

message HelloReply {
  string message = 1;
}
